<!--
  HOW THE BLOG WORKS:
  Posts live in a Google Sheet so nobody has to touch this file.

  ONE-TIME SETUP (Gwyn):
  1. Create a Google Sheet with this exact header row in row 1:
       date | title | body | link | linkText
  2. In Google Sheets: File > Share > Publish to web.
     Choose the sheet tab, pick "Comma-separated values (.csv)", publish.
  3. Copy the published URL and paste it into SHEET_CSV_URL at the top
     of js/site.js.

  POSTING (Kylie):
  Add a row to the sheet. The link and linkText columns are optional.
  Posts appear in sheet order top to bottom, so put new posts in the
  top data row.
-->
